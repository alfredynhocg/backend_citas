{% extends "admin/master.html" %}

{% block title %}Reportes{% endblock %}
{% block page_title %}Dashboard de Reportes{% endblock %}

{% block body %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container-fluid">

    <!-- CARDS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3 text-center">
                <h6 class="text-muted">Usuarios</h6>
                <h2 class="text-primary">10</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3 text-center">
                <h6 class="text-muted">Citas</h6>
                <h2 class="text-success">25</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3 text-center">
                <h6 class="text-muted">Negocios</h6>
                <h2 class="text-warning">7</h2>
            </div>
        </div>

    </div>

    <!-- GRAFICOS -->
    <div class="row">

        <!-- BARRAS -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5 class="mb-3">Citas por categoría</h5>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- TORTA -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3">
                <h5 class="mb-3">Distribución general</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
/* ===== BAR CHART ===== */
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: ['Románticas', 'Trabajo', 'Familia', 'Otros'],
        datasets: [{
            label: 'Citas',
            data: [12, 7, 5, 3],
            backgroundColor: '#4f46e5',
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

/* ===== PIE CHART ===== */
new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: ['Activas', 'Pendientes', 'Canceladas'],
        datasets: [{
            data: [15, 6, 4],
            backgroundColor: [
                '#22c55e',
                '#f59e0b',
                '#ef4444'
            ]
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}
